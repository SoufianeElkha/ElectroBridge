<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo Prodotti — BEK Electric System</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%23F97316'/><path d='M13 2L4.5 13.5H11L9 22L19.5 10H13L13 2Z' fill='white'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #111827; --ink2: #374151; --accent: #F97316; --accent-dark: #EA580C;
      --muted: #6B7280; --bg: #FFFFFF; --surface: #F9FAFB; --border: #E5E7EB;
      --nav-h: 64px;
    }
    [data-theme="dark"] {
      --ink: #F1F5F9; --ink2: #CBD5E1; --accent: #FB923C; --accent-dark: #F97316;
      --muted: #94A3B8; --bg: #0F172A; --surface: #1E293B; --border: #334155;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: var(--ink); background: var(--bg); transition: background .3s, color .3s; }

    /* NAV */
    nav {
      background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); height: var(--nav-h);
      display: flex; align-items: center; padding: 0 24px;
      position: sticky; top: 0; z-index: 100; transition: background .3s;
    }
    [data-theme="dark"] nav { background: rgba(15,23,42,0.95); }
    .nav-inner { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 16px; }
    .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex-shrink: 0; }
    .nav-logo-icon { width: 36px; height: 36px; border-radius: 8px; overflow: hidden; }
    .nav-logo-icon img { width: 36px; height: 36px; display: block; }
    .nav-logo-text { font-size: 1.05rem; font-weight: 800; color: var(--ink); letter-spacing: -.02em; }
    .nav-logo-text span { color: var(--accent); }
    .nav-back { display: flex; align-items: center; gap: 6px; text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); transition: all .2s; margin-left: auto; }
    .nav-back:hover { color: var(--ink); border-color: var(--muted); }
    .dark-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--muted); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: all .2s; }

    /* PAGE HEADER */
    .page-header { padding: 48px 24px 32px; max-width: 1200px; margin: 0 auto; }
    .eyebrow { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; display: block; }
    .page-header h1 { font-size: clamp(26px, 3.5vw, 44px); font-weight: 900; color: var(--ink); letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 10px; }
    .page-header p { font-size: 14px; color: var(--muted); max-width: 480px; line-height: 1.7; }
    .norm-badge { display: inline-flex; align-items: center; gap: 6px; background: color-mix(in srgb,var(--accent) 10%,transparent); color: var(--accent); border: 1px solid color-mix(in srgb,var(--accent) 30%,transparent); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 700; letter-spacing: .5px; margin-top: 14px; }

    /* FILTERS */
    .filters { max-width: 1200px; margin: 0 auto; padding: 0 24px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
    .tab-btn { padding: 7px 16px; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); background: transparent; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .tab-btn.active { background: var(--bg); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .search-wrap { flex: 1; min-width: 200px; max-width: 320px; position: relative; }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .search-input { width: 100%; padding: 8px 12px 8px 34px; border: 1.5px solid var(--border); border-radius: 9px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--ink); background: var(--bg); outline: none; transition: border-color .2s; }
    .search-input:focus { border-color: var(--accent); }
    .count-label { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }

    /* LIST */
    .list-wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }
    .product-list { display: flex; flex-direction: column; gap: 1px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .product-row {
      display: grid;
      grid-template-columns: 220px 80px 70px 70px 80px 180px 1fr;
      align-items: center;
      padding: 14px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 16px;
      transition: background .15s;
    }
    .product-row:last-child { border-bottom: none; }
    .product-row:hover { background: var(--surface); }
    .product-row.hidden { display: none; }

    /* List header */
    .list-header {
      display: grid;
      grid-template-columns: 220px 80px 70px 70px 80px 180px 1fr;
      padding: 10px 20px;
      background: var(--surface);
      gap: 16px;
      border-bottom: 2px solid var(--border);
    }
    .list-header span { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }

    /* Row cells */
    .cell-name { }
    .cell-name .name { font-size: 14px; font-weight: 700; color: var(--ink); }
    .cell-name .code { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: monospace; }
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: .3px; }
    .badge-dol { background: color-mix(in srgb,var(--accent) 12%,transparent); color: var(--accent); }
    .badge-yd  { background: color-mix(in srgb,#3B82F6 12%,transparent); color: #2563EB; }
    [data-theme="dark"] .badge-yd { color: #60A5FA; }
    .cell-kw { font-size: 14px; font-weight: 700; color: var(--ink); }
    .cell-hp { font-size: 13px; color: var(--muted); }
    .cell-amp { font-size: 13px; color: var(--muted); }
    .cell-dims { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .cell-action { display: flex; justify-content: flex-end; }
    .btn-prev { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; white-space: nowrap; transition: background .2s; }
    .btn-prev:hover { background: var(--accent-dark); }

    /* Section divider */
    .section-divider { padding: 10px 20px; background: var(--surface); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .section-divider span { font-size: 11px; font-weight: 700; color: var(--ink2); text-transform: uppercase; letter-spacing: .8px; }
    .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Empty state */
    .empty-state { padding: 60px 20px; text-align: center; }
    .empty-state p { font-size: 14px; color: var(--muted); }

    @media (max-width: 900px) {
      nav { padding: 0 16px; }
      .page-header, .filters, .list-wrap { padding-left: 16px; padding-right: 16px; }
      .list-header { display: none; }
      .product-row {
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto auto;
        gap: 6px;
      }
      .product-row > :not(.cell-name):not(.cell-action) { display: none; }
      .cell-name { grid-column: 1; }
      .cell-action { grid-column: 2; grid-row: 1; align-self: center; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="PREVIEW_SITO_V2.html" class="nav-logo">
      <div class="nav-logo-icon">
        <img src="assets/logo.svg" alt="BEK Electric logo">
      </div>
      <span class="nav-logo-text"><span>BEK</span> Electric</span>
    </a>
    <a href="PREVIEW_SITO_V2.html" class="nav-back">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Torna al sito
    </a>
    <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Cambia tema">🌙</button>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <span class="eyebrow">Catalogo Prodotti</span>
  <h1>Linea Smart BEK</h1>
  <p>Quadri di comando per elettropompe antincendio — avviamento diretto (DOL) e stella-triangolo (Y/Δ).</p>
  <div class="norm-badge">⚡ Conformi EN 12845</div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="tabs">
    <button class="tab-btn active" data-cat="all" onclick="filter(this,'all')">Tutti</button>
    <button class="tab-btn" data-cat="direct" onclick="filter(this,'direct')">DOL — Avviamento Diretto</button>
    <button class="tab-btn" data-cat="star-delta" onclick="filter(this,'star-delta')">Y/Δ — Stella-Triangolo</button>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input type="search" class="search-input" id="search" placeholder="Cerca per kW, nome o codice…" oninput="search()">
  </div>
  <span class="count-label" id="count-label"></span>
</div>

<!-- PRODUCT LIST -->
<div class="list-wrap">
  <div class="product-list" id="product-list">
    <div class="list-header">
      <span>Modello</span>
      <span>Tipo</span>
      <span>Potenza</span>
      <span>HP</span>
      <span>Corrente max</span>
      <span>Dim. (H×L×P mm)</span>
      <span></span>
    </div>
    <!-- rows injected by JS -->
    <div class="empty-state" id="empty-state" style="display:none"><p>Nessun prodotto trovato.</p></div>
  </div>
</div>

<script>
  // Dark mode
  function toggleDark() {
    const dark = document.documentElement.getAttribute('data-theme') !== 'dark';
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('darkToggle').textContent = dark ? '☀️' : '🌙';
    localStorage.setItem('bek-theme', dark ? 'dark' : 'light');
  }
  (function() {
    if (localStorage.getItem('bek-theme') === 'dark') {
      document.documentElement.setAttribute('data-theme','dark');
      document.getElementById('darkToggle').textContent = '☀️';
    }
  })();

  let allProducts = [];
  let activeCat = 'all';
  let activeSearch = '';

  // Load products from products.json
  fetch('products.json')
    .then(r => r.json())
    .then(data => {
      allProducts = data.products;
      renderAll();
    })
    .catch(() => {
      document.getElementById('product-list').innerHTML = '<div class="empty-state"><p>Impossibile caricare il catalogo. <a href="PREVENTIVO.html" style="color:var(--accent)">Richiedi informazioni</a></p></div>';
    });

  function renderAll() {
    const list = document.getElementById('product-list');
    // Remove old rows (keep header and empty state)
    list.querySelectorAll('.product-row,.section-divider').forEach(el => el.remove());

    const filtered = allProducts.filter(p => {
      if (activeCat !== 'all' && p.category !== activeCat) return false;
      if (activeSearch) {
        const q = activeSearch.toLowerCase();
        const name = (p.name || '').toLowerCase().replace('ege smart','bek smart');
        const code = (p.code || '').toLowerCase();
        const kw = String(p.kw);
        if (!name.includes(q) && !code.includes(q) && !kw.includes(q)) return false;
      }
      return true;
    });

    document.getElementById('count-label').textContent = filtered.length + ' prodott' + (filtered.length === 1 ? 'o' : 'i');
    document.getElementById('empty-state').style.display = filtered.length ? 'none' : '';

    const header = list.querySelector('.list-header');

    // Group by category when showing all
    let lastCat = null;
    for (const p of filtered) {
      if (activeCat === 'all' && p.category !== lastCat) {
        lastCat = p.category;
        const div = document.createElement('div');
        div.className = 'section-divider';
        const label = p.category === 'direct' ? 'Avviamento Diretto (DOL)' : 'Stella-Triangolo (Y/Δ)';
        div.innerHTML = `<span>${label}</span>`;
        list.insertBefore(div, document.getElementById('empty-state'));
      }

      const displayName = (p.name || '').replace(/EGE SMART/gi, 'BEK Smart');
      const isDOL = p.category === 'direct';
      const badgeClass = isDOL ? 'badge-dol' : 'badge-yd';
      const badgeLabel = isDOL ? 'DOL' : 'Y/Δ';
      const dims = p.box ? `${p.box.h} × ${p.box.l} × ${p.box.w}` : '—';
      const modelParam = encodeURIComponent(displayName);

      const row = document.createElement('div');
      row.className = 'product-row';
      row.dataset.cat = p.category;
      row.innerHTML = `
        <div class="cell-name">
          <div class="name">${displayName}</div>
          <div class="code">${p.code}</div>
        </div>
        <div><span class="badge ${badgeClass}">${badgeLabel}</span></div>
        <div class="cell-kw">${p.kw} kW</div>
        <div class="cell-hp">${p.hp} HP</div>
        <div class="cell-amp">${p.currentMax} A</div>
        <div class="cell-dims">${dims}<br><span style="font-size:11px">${p.weight} kg</span></div>
        <div class="cell-action">
          <a href="PREVENTIVO.html?model=${modelParam}" class="btn-prev">Preventivo →</a>
        </div>`;
      list.insertBefore(row, document.getElementById('empty-state'));
    }
  }

  function filter(btn, cat) {
    activeCat = cat;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  }

  function search() {
    activeSearch = document.getElementById('search').value.trim();
    renderAll();
  }
</script>
</body>
</html>
